name: Security Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-security:
    name: Python tests and dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install HomeGuard and test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pip-audit

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run pip audit
        run: pip-audit

      - name: Run HomeGuard release security preflight
        run: python scripts/security_release_gate.py

  node-security:
    name: Electron dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run full npm audit
        run: npm audit --audit-level=high

      - name: Run Electron smoke test if available
        run: npm run smoke --if-present
