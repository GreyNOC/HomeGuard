name: Build and publish Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, without leading v
        required: true
        default: 1.6.0
      tag_name:
        description: Release tag name
        required: true
        default: v1.6.0
  push:
    tags:
      - v*

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build-and-publish:
    name: Build and publish Windows artifacts
    runs-on: windows-latest

    env:
      HOMEGUARD_SIGN_CERT_PATH: ${{ github.workspace }}\GreyNOC-CodeSigning.pfx
      HOMEGUARD_SIGN_CERT_PASSWORD: ${{ secrets.HOMEGUARD_SIGN_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $version = $env:INPUT_VERSION
            $tagName = $env:INPUT_TAG_NAME
          } else {
            $tagName = $env:REF_NAME
            $version = ($tagName -replace '^v', '') -replace '-.*$', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must be semantic version X.Y.Z. Got: $version"
          }
          # Allow an optional suffix, e.g. v1.6.0-portable: GitHub immutable
          # releases lock a tag once it has hosted a release, so a binary build
          # published alongside (or after) a source tag uses a distinct -suffix
          # tag. The numeric version above is still X.Y.Z (suffix stripped).
          if ($tagName -notmatch '^v\d+\.\d+\.\d+(-[A-Za-z0-9.]+)?$') {
            throw "Tag must look like vX.Y.Z or vX.Y.Z-suffix. Got: $tagName"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT

      # Decide how (or whether) to sign. Precedence: SignPath (free for OSS) ->
      # GreyNOC PFX certificate -> unsigned fallback. The release NEVER fails
      # just because signing is not configured; it ships unsigned with
      # checksums instead. See docs/release/SIGNING.md.
      - name: Resolve signing mode
        id: signing
        env:
          SIGN_CERT_BASE64: ${{ secrets.HOMEGUARD_SIGN_CERT_BASE64 }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORG: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
        run: |
          if ($env:SIGNPATH_API_TOKEN -and $env:SIGNPATH_ORG) {
            $mode = "signpath"
          } elseif ($env:SIGN_CERT_BASE64 -and $env:HOMEGUARD_SIGN_CERT_PASSWORD) {
            $mode = "pfx"
          } else {
            $mode = "unsigned"
          }
          Write-Host "Signing mode: $mode"
          if ($mode -eq "unsigned") {
            Write-Warning "No code-signing configured - building an UNSIGNED release. Windows SmartScreen will warn users on download. See docs/release/SIGNING.md to enable free SignPath signing."
          }
          "mode=$mode" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Restore signing certificate
        if: steps.signing.outputs.mode == 'pfx'
        env:
          SIGN_CERT_BASE64: ${{ secrets.HOMEGUARD_SIGN_CERT_BASE64 }}
        run: |
          [IO.File]::WriteAllBytes($env:HOMEGUARD_SIGN_CERT_PATH, [Convert]::FromBase64String($env:SIGN_CERT_BASE64))

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,exe,tray]"
          npm ci

      - name: Run release gates
        run: |
          python -m unittest discover -s tests -v
          python scripts\security_release_gate.py
          npm audit --audit-level=high
          if (Test-Path electron\smoke.js) { npm run smoke }

      - name: Build signed installer and portable EXE (certificate)
        if: steps.signing.outputs.mode == 'pfx'
        run: |
          powershell -NoProfile -File scripts\build_windows_installer.ps1 -Version "${{ steps.meta.outputs.version }}" -ExpectedPublisher GreyNOC
          $portable = Get-ChildItem -Path dist\electron -Filter "HomeGuard-Portable-v${{ steps.meta.outputs.version }}*.exe" -File | Select-Object -First 1
          if (-not $portable) {
            throw "Portable EXE was not produced."
          }
          powershell -NoProfile -File scripts\sign_windows_artifact.ps1 -Path $portable.FullName -ExpectedPublisher GreyNOC
          powershell -NoProfile -File scripts\verify_windows_signature.ps1 -Path $portable.FullName -ExpectedPublisher GreyNOC

      - name: Build unsigned installer and portable EXE
        if: steps.signing.outputs.mode != 'pfx'
        run: |
          powershell -NoProfile -File scripts\build_windows_installer.ps1 -Version "${{ steps.meta.outputs.version }}" -ExpectedPublisher GreyNOC -Unsigned
          $portable = Get-ChildItem -Path dist\electron -Filter "HomeGuard-Portable-v${{ steps.meta.outputs.version }}*.exe" -File | Select-Object -First 1
          if (-not $portable) {
            throw "Portable EXE was not produced."
          }

      # --- SignPath (https://signpath.io) Authenticode signing. DORMANT until
      #     you connect SignPath and set the repo variables SIGNPATH_ORGANIZATION_ID,
      #     SIGNPATH_PROJECT_SLUG, SIGNPATH_SIGNING_POLICY_SLUG plus the secret
      #     SIGNPATH_API_TOKEN. While unset, mode is never 'signpath' and every
      #     step below is skipped, so it cannot affect the unsigned/PFX paths.
      #     Validate this path on its first real run (see docs/release/SIGNING.md). ---
      - name: Stage unsigned artifacts for SignPath
        if: steps.signing.outputs.mode == 'signpath'
        id: signpath_upload
        uses: actions/upload-artifact@v4
        with:
          name: homeguard-unsigned
          path: |
            dist/installer/HomeGuard-Setup-v${{ steps.meta.outputs.version }}.exe
            dist/electron/HomeGuard-Portable-v${{ steps.meta.outputs.version }}*.exe

      - name: Sign with SignPath
        if: steps.signing.outputs.mode == 'signpath'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.signpath_upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed

      - name: Promote SignPath-signed artifacts
        if: steps.signing.outputs.mode == 'signpath'
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $signedInstaller = Get-ChildItem -Path dist/signed -Recurse -Filter "HomeGuard-Setup-v$version.exe" -File | Select-Object -First 1
          $signedPortable = Get-ChildItem -Path dist/signed -Recurse -Filter "HomeGuard-Portable-v$version*.exe" -File | Select-Object -First 1
          if (-not $signedInstaller -or -not $signedPortable) {
            throw "SignPath did not return both signed artifacts under dist/signed."
          }
          Copy-Item $signedInstaller.FullName "dist\installer\$($signedInstaller.Name)" -Force
          Copy-Item $signedPortable.FullName "dist\electron\$($signedPortable.Name)" -Force

      - name: Prepare release assets
        id: assets
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $installer = "dist\installer\HomeGuard-Setup-v$version.exe"
          $portable = (Get-ChildItem -Path dist\electron -Filter "HomeGuard-Portable-v$version*.exe" -File | Select-Object -First 1).FullName
          if (-not (Test-Path $installer)) { throw "Missing installer: $installer" }
          if (-not (Test-Path $portable)) { throw "Missing portable EXE: $portable" }
          Get-FileHash -Algorithm SHA256 $installer, $portable | ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } | Set-Content -Path dist\SHA256SUMS.txt
          "installer=$installer" >> $env:GITHUB_OUTPUT
          "portable=$portable" >> $env:GITHUB_OUTPUT
          "checksums=dist\SHA256SUMS.txt" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.meta.outputs.tag_name }}"
          $version = "${{ steps.meta.outputs.version }}"
          $mode = "${{ steps.signing.outputs.mode }}"
          git fetch --tags
          if (-not (git tag --list $tag)) {
            git tag $tag
            git push origin $tag
          }
          switch ($mode) {
            "signpath" { $signingLine = "Signed with SignPath Authenticode signing." }
            "pfx" { $signingLine = "Signed with the GreyNOC code-signing certificate (Authenticode)." }
            default { $signingLine = "UNSIGNED build. Windows SmartScreen may warn on first run, and Microsoft Defender may flag the EXE with a machine-learning heuristic such as Trojan:Win32/Bearfoos.A!ml. That is a known FALSE POSITIVE for unsigned, PyInstaller-packaged apps (the ``!ml`` suffix means a heuristic guess, not a confirmed signature), not a real detection. Verify the download against the SHA-256 checksums below before running, then allow your verified copy in Windows Security. Signed builds remove these warnings - see docs/release/SIGNING.md." }
          }
          $notes = "Windows release for HomeGuard v$version.`n`n$signingLine`n`nAssets:`n- HomeGuard-Setup-v$version.exe installer`n- HomeGuard-Portable-v$version.exe portable executable`n- SHA256SUMS.txt checksums"
          $assets = @("${{ steps.assets.outputs.installer }}", "${{ steps.assets.outputs.portable }}", "${{ steps.assets.outputs.checksums }}")
          # GitHub releases here are immutable: a tag can host exactly one
          # release, permanently. Create it once with the assets attached. If
          # the tag was already published, this fails clearly (HTTP 422) so the
          # operator publishes under a new tag (e.g. vX.Y.Z-portable) rather
          # than silently doing nothing.
          gh release create $tag @assets --title "HomeGuard v$version" --notes $notes --verify-tag
